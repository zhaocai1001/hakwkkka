name: Get TaoIPTV Token

on:
  workflow_dispatch: # 支持手动触发测试
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次

permissions:
  contents: write

jobs:
  fetch-and-save-token:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Install Playwright Chromium
      run: |
        playwright install chromium --with-deps

    - name: Run script to get Token
      run: |
        python - <<EOF
        import asyncio
        import sys
        from playwright.async_api import async_playwright

        async def main():
            async with async_playwright() as p:
                browser = await p.chromium.launch(headless=True)
                context = await browser.new_context(
                    viewport={"width": 1920, "height": 1080},
                    user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                )
                page = await context.new_page()
                page.set_default_timeout(45000)
                
                print("正在打开网页 taoiptv.com ...")
                try:
                    await page.goto("https://taoiptv.com/", wait_until="domcontentloaded")
                except Exception as e:
                    print(f"网页打开超时，但我们继续尝试: {e}")
                
                print("给予 JS 组件足够的加载时间 (8s)...")
                await page.wait_for_timeout(8000)
                
                # =======================================================
                # 【核心绝招】：在网页底层注入监听器，直接截获网页在点击时“复制”的内容
                # =======================================================
                print("正在注入复制捕获拦截器...")
                await page.evaluate("""() => {
                    window.__capturedToken = "";
                    // 监听全网页的 copy 事件，一旦网页调用复制，拦截它并存在全局变量里
                    document.addEventListener('copy', (e) => {
                        window.__capturedToken = window.getSelection().toString();
                        // 兜底方案：如果通过选择文本拿不到，尝试从 clipboardData 拿
                        if (e.clipboardData) {
                            window.__capturedToken = e.clipboardData.getData('text/plain') || window.__capturedToken;
                        }
                    }, true);
                }""")
                
                print("正在通过底层 JS 触发『获取ToKen』按钮点击...")
                try:
                    await page.evaluate("""() => {
                        const links = Array.from(document.querySelectorAll('a'));
                        const targetLink = links.find(el => el.textContent.includes('获取ToKen') || el.textContent.includes('获取Token'));
                        if (targetLink) {
                            // 主动选中它的文本触发某些复制脚本的判定（兜底）
                            const range = document.createRange();
                            range.selectNodeContents(targetLink);
                            const sel = window.getSelection();
                            sel.removeAllRanges();
                            sel.addRange(range);
                            
                            // 触发点击
                            targetLink.click();
                            return "成功触发点击事件";
                        }
                        return "未找到按钮";
                    }""")
                except Exception as e:
                    print(f"执行底层点击发生异常: {e}")
                
                # 等待 4 秒让事件和可能的弹窗逻辑走完
                await page.wait_for_timeout(4000)
                
                # 从我们刚才提前埋好的全局变量中，把拦截到的 Token 提取出来
                print("正在读取捕获到的 Token 数据...")
                captured_token = await page.evaluate("() => window.__capturedToken")
                
                # 【兜底方案】：如果事件拦截没有拿到（有些网站是通过 alert 弹窗或者更改输入框值来复制的）
                if not captured_token:
                    print("⚠️ 事件拦截未捕获到 Token，正在启动整页扫描与输入框/弹窗兜底提取...")
                    # 提取页面上可能动态新出现的、长得像 token 的值
                    body_text = await page.locator("body").inner_text()
                    
                    # 尝试读取网页上可能存在的输入框（很多网站点击获取Token后会在输入框里显示）
                    inputs = await page.locator("input").all_inner_texts()
                    for inp in inputs:
                        if inp and len(inp) > 5:
                            captured_token = inp
                            break
                    
                    if not captured_token:
                        # 如果实在没拿到，就用整页文本作为最后防线
                        captured_token = body_text

                # 清洗多余的空格或换行
                if captured_token:
                    captured_token = captured_token.strip()
                
                if not captured_token or len(captured_token) < 3:
                    print("❌ 错误：彻底未能获取到任何有效 Token 数据！")
                    sys.exit(1)
                    
                print("--- 🌟 最终捕获到的 Token 展现 ---")
                print(captured_token)
                
                # 保存到本地文本文件
                target_file = "token.txt"
                with open(target_file, "w", encoding="utf-8") as f:
                    f.write(captured_token)
                print(f"Token 数据已安全写入到文件: {target_file}")
                
                browser.close()

        asyncio.run(main())
        EOF

    # 6. 将 token.txt 自动推送回你的 GitHub 仓库（等同于自动保存和粘贴）
    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        if [ -f "token.txt" ]; then
          git add token.txt
          if ! git diff-index --quiet HEAD --; then
            git commit -m "🤖 自动化同步最新 TaoIPTV Token"
            git push origin main
            echo "Token 已经成功自动粘贴并同步至仓库文件！"
          else
            echo "Token 内容相比上一次没有变化，跳过本次提交。"
          fi
        else
          echo "未找到 token.txt 文件"
          exit 1
        fi
