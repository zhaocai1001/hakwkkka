name: Auto Fetch Token
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install playwright
        run: |
          pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run crawl script
        run: |
          cat > crawl.py << 'END_SCRIPT'
from playwright.sync_api import sync_playwright
import re
def main():
    with sync_playwright() as p:
        browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
        page = browser.new_page(user_agent="Mozilla/5.0 Chrome/120")
        page.goto("https://taoiptv.com/#", timeout=40000, wait_until="networkidle")
        page.wait_for_timeout(5000)
        page.click("span:has-text('获取Token')")
        page.wait_for_timeout(3000)
        html = page.content()
        browser.close()
        res = re.search(r'token=([a-zA-Z0-9]{16})', html)
        if not res:
            raise Exception("Token not found")
        token = res.group(1)
        with open("token.txt", "w", encoding="utf-8") as f:
            f.write(token)
        print(f"TOKEN={token}")
if __name__ == "__main__":
    main()
END_SCRIPT
          python crawl.py >> $GITHUB_ENV

      - name: Git config
        run: |
          git config --global user.name "TokenBot"
          git config --global user.email "bot@github.com"

      - name: Commit token file
        run: |
          git add token.txt
          if git diff --cached --quiet; then
            echo "No change, skip commit"
          else
            git commit -m "Auto update token ${{ env.TOKEN }}"
            git push origin main
