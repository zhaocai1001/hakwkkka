name: Get TaoIPTV Token

on:
  workflow_dispatch: # 支持在 GitHub Actions 页面上手动点击运行
  schedule:
    - cron: '0 */6 * * *' # 定时任务，每 6 小时自动运行一次

permissions:
  contents: write

jobs:
  fetch-and-save-token:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Install Playwright Chromium
      run: |
        playwright install chromium --with-deps

    - name: Run script to get Token
      run: |
        python - <<EOF
        import asyncio
        import sys
        from playwright.async_api import async_playwright

        async def main():
            async with async_playwright() as p:
                # 模拟大分辨率的真实电脑浏览器环境，防止菜单栏折叠
                browser = await p.chromium.launch(headless=True)
                context = await browser.new_context(
                    permissions=["clipboard-read", "clipboard-write"],
                    viewport={"width": 1920, "height": 1080},
                    user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                )
                page = await context.new_page()
                page.set_default_timeout(45000)
                
                print("正在打开网页 taoiptv.com ...")
                try:
                    await page.goto("https://taoiptv.com/", wait_until="domcontentloaded")
                except Exception as e:
                    print(f"网页打开超时，但我们继续尝试: {e}")
                
                print("给予 JS 组件足够的加载时间 (8s)...")
                await page.wait_for_timeout(8000)
                
                print("【核心突破】正在直接执行底层 JS 指令来触发『获取ToKen』按钮点击...")
                try:
                    # 利用你提供的图片特征：左上角、文字含有 "获取ToKen" 的 <a> 标签
                    # 直接通过评估 JS，找到这个元素并执行 .click()，绕过所有界面不可见的报错
                    await page.evaluate("""() => {
                        const links = Array.from(document.querySelectorAll('a'));
                        const targetLink = links.find(el => el.textContent.includes('获取ToKen') || el.textContent.includes('获取Token'));
                        if (targetLink) {
                            targetLink.click();
                            return "成功在底层触发点击事件";
                        }
                        return "未在页面中找到 '获取ToKen' 链接";
                    }""")
                    print("底层点击指令已发出。")
                except Exception as e:
                    print(f"执行底层点击发生异常: {e}")
                
                # 留出 3 秒让网站的复制到剪贴板代码执行完毕
                await page.wait_for_timeout(3000)
                
                # 从虚拟剪贴板读取网站刚才复制进去的 Token
                print("正在『粘贴』：从浏览器剪贴板捕获 Token...")
                try:
                    copied_token = await page.evaluate("async () => { return await navigator.clipboard.readText(); }")
                    copied_token = copied_token.strip()
                except Exception as e:
                    print(f"读取剪贴板失败 ({e})，将尝试提取整页文本兜底。")
                    copied_token = await page.locator("body").inner_text()
                
                if not copied_token or len(copied_token) < 3:
                    print("❌ 错误：剪贴板为空，未成功获取到 Token！")
                    sys.exit(1)
                    
                print("--- 🌟 成功捕获到 Token ---")
                print(copied_token)
                
                # 保存到指定的本地文件
                target_file = "token.txt"
                with open(target_file, "w", encoding="utf-8") as f:
                    f.write(copied_token)
                print(f"Token 数据已成功写入文件: {target_file}")
                
                await browser.close()

        asyncio.run(main())
        EOF

    # 6. 将 token.txt 自动推送回你的 GitHub 仓库（等同于永久保存）
    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        if [ -f "token.txt" ]; then
          git add token.txt
          if ! git diff-index --quiet HEAD --; then
            git commit -m "🤖 自动化同步最新 TaoIPTV Token"
            git push origin main
            echo "Token 已经成功自动粘贴并同步至仓库文件！"
          else
            echo "Token 内容相比上一次没有变化，跳过本次提交。"
          fi
        else
          echo "未找到 token.txt 文件"
          exit 1
        fi
