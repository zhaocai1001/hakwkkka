name: Auto Fetch Token
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  crawl_token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch token
        id: get_tk
        run: python3 -c 'import re;from playwright.sync_api import sync_playwright;p=sync_playwright().start();br=p.chromium.launch(headless=True,args=["--no-sandbox"]);pg=br.new_page(ua="Mozilla/5.0 Chrome/122");pg.goto("https://taoiptv.com/#",timeout=60000,wait_until="networkidle");pg.wait_for_timeout(8000);pg.click("span:has-text(\"获取Token\")");pg.wait_for_timeout(5000);html=pg.content();br.close();p.stop();m=re.search(r"token=([a-zA-Z0-9]{16})",html);tk=m.group(1);open("token.txt","w",encoding="utf-8").write(tk);print("TOKEN="+tk)' >> $GITHUB_ENV

      - name: Git config
        run: |
          git config --global user.name "TokenBot"
          git config --global user.email "bot@github.com"

      - name: Save token file
        run: |
          git add token.txt
          if git diff --cached --quiet; then echo "No change skip push"; else git commit -m "Update token ${{ env.TOKEN }}"; git push origin main; fi
