name: Auto Fetch Token
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  crawl_token:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装爬虫依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: 抓取页面Token
        id: crawl
        run: |
          python3 << 'PYCODE'
from playwright.sync_api import sync_playwright
import re
def get_token():
    try:
        with sync_playwright() as p:
            browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
            page = browser.new_page(user_agent="Mozilla/5.0 Chrome/122")
            page.goto("https://taoiptv.com/#", timeout=60000, wait_until="networkidle")
            page.wait_for_timeout(8000)
            page.click("span:has-text('获取Token')")
            page.wait_for_timeout(5000)
            html = page.content()
            browser.close()
            res = re.search(r'token=([A-Za-z0-9]{16})', html)
            if not res:
                print("ERROR: 未找到16位Token")
                exit(1)
            token = res.group(1).strip()
            with open("token.txt", "w", encoding="utf-8") as f:
                f.write(token)
            print(f"TOKEN={token}")
    except Exception as e:
        print(f"爬虫异常: {str(e)}")
        exit(1)
if __name__ == "__main__":
    get_token()
PYCODE
          python3 crawl.py >> $GITHUB_ENV

      - name: 配置Git提交用户
        run: |
          git config --global user.name "AutoTokenBot"
          git config --global user.email "bot@github.com"

      - name: 提交更新token.txt
        run: |
          git add token.txt
          if git diff --cached --quiet; then
            echo "Token无变更，跳过提交"
          else
            git commit -m "自动更新Token ${{ env.TOKEN }}"
            git push origin main
