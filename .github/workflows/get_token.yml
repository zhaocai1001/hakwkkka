name: Auto Fetch Token
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  crawl_token:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装Playwright浏览器依赖
        run: |
          pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: 抓取Token并写入文件
        id: crawl
        run: |
          python3 -c "
from playwright.sync_api import sync_playwright
import re
def run():
    with sync_playwright() as p:
        browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
        page = browser.new_page(user_agent='Mozilla/5.0 Chrome/120')
        page.goto('https://taoiptv.com/#', timeout=40000, wait_until='networkidle')
        page.wait_for_timeout(5000)
        page.click('span:has-text(\"获取Token\")')
        page.wait_for_timeout(3000)
        html = page.content()
        browser.close()
        match = re.search(r'token=([a-zA-Z0-9]{16})', html)
        if not match:
            raise Exception('未匹配到16位Token')
        token = match.group(1)
        with open('token.txt', 'w', encoding='utf-8') as f:
            f.write(token)
        print(f'TOKEN={token}')
if __name__ == '__main__':
    run()
          " >> $GITHUB_ENV

      - name: 配置Git提交身份
        run: |
          git config --global user.name "AutoTokenBot"
          git config --global user.email "bot@github.com"

      - name: 提交更新token.txt到仓库
        run: |
          git add token.txt
          if git diff --cached --quiet; then
            echo "Token无变化，跳过提交"
          else
            git commit -m "自动更新Token: ${{ env.TOKEN }}"
            git push origin main
