name: Get TaoIPTV Token

# 触发条件：支持手动触发，或者每隔 6 小时自动运行一次
on:
  workflow_dispatch: # 支持在 GitHub 页面上手动点击运行
  schedule:
    - cron: '0 */6 * * *' # 定时任务（UTC 时间），每 6 小时执行一次

jobs:
  fetch-token:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖（Playwright 浏览器自动化工具）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    # 4. 安装 Playwright 所需的 Chromium 浏览器内核
    - name: Install Playwright Webkit/Chromium
      run: |
        playwright install chromium --with-deps

    # 5. 运行 Python 脚本模拟点击并获取 Token
    - name: Run script to get Token
      run: |
        python - <<EOF
        import asyncio
        from playwright.async_api import async_playwright

        async def main():
            async with async_playwright() as p:
                # 启动无头浏览器
                browser = await p.chromium.launch(headless=True)
                page = await browser.new_page()
                
                # 访问目标网站
                print("正在打开网页...")
                await page.goto("https://taoiptv.com", wait_until="networkidle")
                
                # 等待“获取ToKen”文本或按钮出现并点击
                # 这里使用文字匹配定位，如果网站结构改变，可能需要更换为 CSS 选择器
                print("正在寻找并点击 '获取ToKen'...")
                await page.click("text=获取ToKen")
                
                # 给予页面一定的加载或弹窗响应时间
                await page.wait_for_timeout(3000)
                
                # 打印点击后的页面文本或截图（方便在日志中查看 Token）
                content = await page.content()
                print("--- 页面内容获取成功 ---")
                
                # 提取并打印屏幕上的文本
                body_text = await page.locator("body").inner_text()
                print(body_text)
                
                await browser.close()

        asyncio.run(main())
        EOF
